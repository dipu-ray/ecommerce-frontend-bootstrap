<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="A responsive and amazing Admin Dashboard website">
    <meta name="keywords" content="HTML, CSS, Bootstrap">
    <meta name="author" content="Dipu Ray">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Bootstrap Icon CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Link up my custom CSS file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="row d-flex">
        <!-- Aside Bar -->
        <aside class="col-2 bg-dark rounded-3 px-0">
            <!-- Logo -->
            <div class="w-75 pt-2 px-4">
                <a href="#x" class="d-flex gap-2 align-items-center text-decoration-none">
                    <div class="fs-2 text-white">AD</div>
                    <div class="d-flex flex-column lh-1">
                        <span class="admin-span text-white fw-semibold">AdminDash</span>
                        <span class="panel-span fw-normal text-uppercase">Admin Panel</span>
                    </div>
                </a>
            </div>

            <!-- Horizontal Bar -->
            <div class="horizontal w-100 my-2"></div>

            <!-- Aside Links -->
            <div class="aside-links my-2">
                <!-- Aside Top -->
                <div class="d-flex gap-1 flex-column px-2">
                    <a href="#x">
                        <i class="bi bi-grid"></i>
                        Dashboard
                    </a>
                    <a href="#x">
                        <i class="bi bi-speedometer"></i>
                        Dashboards
                    </a>
                    <a href="#x">
                        <i class="bi bi-people"></i>
                        Users
                    </a>
                    <a href="#x">
                        <i class="bi bi-shield-check"></i>
                        Authentication
                    </a>
                </div>

                <!-- Aside Apps -->
                <div class="d-flex gap-1 flex-column px-2 mt-4">
                    <span class="text-uppercase ms-3 fw-semibold" style="font-size: .8rem;">Apps</span>
                    <a href="#x">
                        <i class="bi bi-calendar2-date"></i>
                        Calendar
                    </a>
                    <a href="#x">
                        <i class="bi bi-kanban"></i>
                        Kanban Board
                    </a>
                    <a href="#x">
                        <i class="bi bi-chat"></i>
                        Chats
                    </a>
                    <a href="#x">
                        <i class="bi bi-person-rolodex"></i>
                        Contact
                    </a>
                    <a href="#x">
                        <i class="bi bi-folder-fill"></i>
                        File Manager
                    </a>
                    <a href="#x">
                        <i class="bi bi-envelope"></i>
                        Email
                    </a>
                    <a href="#x">
                        <i class="bi bi-check-square"></i>
                        Todo List
                    </a>
                    <a href="#x">
                        <i class="bi bi-headset"></i>
                        Support Center
                    </a>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <section class="col-10 px-4">
            <!-- Navbar -->
            <div class="nav bg-dark rounded-3 px-5 py-4 d-flex align-items-center justify-content-between">
                <!-- Nav Left -->
                <div class="d-flex align-items-center gap-4">
                    <a href="#x" class="nav-links fs-5 text-white-50"><i class="bi bi-list"></i></a>
                    <a href="#x" class="nav-links fs-5 text-white-50"><i class="bi bi-search"></i></a>
                </div>

                <!-- Nav Right -->
                <div class="d-flex align-items-center gap-4">
                    <a href="#x" class="nav-links fs-5 text-white-50"><i class="bi bi-brightness-high"></i></a>
                    <a href="#x" class="nav-links fs-5 text-white-50"><i class="bi bi-fullscreen"></i></a>
                    <a href="#x" class="nav-links fs-5 text-white-50"><i class="bi bi-bell"></i></a>
                    <a href="#x" class="bg-white rounded-circle" style="width: 30px;">
                        <img class="w-100" src="assets/images/profile.png" alt="Cat Image">
                    </a>
                </div>
            </div>

            <!-- Main Intro -->
            <div class="d-flex align-items-center justify-content-between my-4">
                <div>
                    <h1 class="fs-3 text-white">Good morning, Alex</h1>
                    <p>Here's what's happening with your business today.</p>
                </div>
                <div class="d-flex gap-3">
                    <a href="#x" class="l-days text-decoration-none text-white-50 border border-dark ps-3 pe-2 py-1 fw-semibold rounded-3" style="font-size: .9rem;">
                        <i class="bi bi-calendar3"></i>
                        Last 30 Days
                    </a>
                    <a href="#x" class="export-btn text-decoration-none bg-white text-black px-3 py-1 fw-semibold rounded-3">
                        <i class="bi bi-download"></i>
                        Export
                    </a>
                </div>
            </div>
        </section>
    </main>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
