<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Bootstrap Icon CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Google Font Links -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- To link my CSS file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Main Container -->
    <main class="container d-flex justify-content-center align-items-center" style="height: 100vh;">

        <!-- Profile -->
        <div class="card border border-1 rounded-5 text-white card-bg" style="width: 18rem;">

            <!-- Profile Image -->
            <div class="ratio ratio-4x3">
                <img src="assets/images/person.png"
                    class="card-img-top object-fit-cover rounded-5 rounded-bottom-0 p-2"
                    alt="Female Professional Photo">
            </div>

            <!-- Profile Content -->
            <div class="card-body mb-2">
                <h5 class="card-title fs-2">Jerome Bell</h5>
                <p class="card-text">Product Designer who focuses on simplicity & usablity</p>
                <a href="#" class="btn btn-success rounded-5 px-4 py-2"><i class="bi bi-plus"></i> Follow</a>
            </div>
        </div>
    </main>

    <!-- Bootstrap CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
